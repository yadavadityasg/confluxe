# One-command stack: Postgres + Supabase auth (GoTrue) + PostgREST + your app.
# Run on a single EC2 instance:  docker compose up -d
# Access the app at:             http://<EC2_PUBLIC_IP>:3000

services:
  db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      # Auto-applied on first boot (empty volume only)
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth:
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${PUBLIC_BASE_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${PUBLIC_BASE_URL}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"  # IP setup: no email server; flip to false once SMTP is configured
      GOTRUE_SMS_AUTOCONFIRM: "true"
    ports:
      - "9999:9999"

  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "3001:3000"

  # Tiny gateway exposing /auth/* and /rest/* on a single origin (mimics Supabase URL shape)
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:8000"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${PUBLIC_BASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
        VITE_SUPABASE_PROJECT_ID: local
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: ${PUBLIC_BASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
    ports:
      - "3000:3000"

volumes:
  db-data:
